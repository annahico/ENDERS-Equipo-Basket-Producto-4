<header class="site-header">
    <nav class="navbar navbar-expand-lg navbar-dark px-4 px-lg-5">
        <a class="navbar-brand" href="#">
            <img class="logo" src="assets/logos/logo.png">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="menu">
            <ul class="navbar-nav align-items-lg-center">
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" (click)="view='home'">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-custom" (click)="view='plantilla'">Plantilla</a>
                </li>
                <li>
                    <a class="nav-link nav-link-custom">Noticias</a>
                </li>
            </ul>

            <div class="ms-lg-4 mt-3 mt-lg-0 nav-search">
                <input class="form-control nav-search-input" placeholder="Buscar">
            </div>
        </div>
    </nav> 
</header>
@if (view === 'home'){
<section class="background hero">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-6 hero-image hero-img-wrapper text-center">
                <img src="assets/images/portada1.png" class="hero-img">
            </div>
            <div class="col-lg-6 hero-text text-center text-lg-end">
                <h1><span>ENDERS</span><br>TEAM<br>BASKET</h1>
            </div>
        </div>
    </div>  
</section>
}
@if (view === 'plantilla'){
<section class="background">
    <app-players-component (playerSelected)="onPlayerSelected($event)"></app-players-component>
    @if(selectedPlayer){
            <app-detail-component
                [player]="selectedPlayer"
                (closeDetail)="closeDetail()">
            </app-detail-component>
        }
</section>
}
<footer class="text-center mt-5 site-footer">
    <div class="logo-uoc"></div>
    <p class="mb-2 footer-title">Universitat Oberta de Catalunya</p>
    <p class="mb-5 footer-subtitle">Desarrollo Front-End con Frameworks avanzados en entornos móviles</p>
</footer>
